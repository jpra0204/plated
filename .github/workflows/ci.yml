name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: plated_test
          POSTGRES_USER: plated
          POSTGRES_PASSWORD: plated
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (web)
        run: npm run lint -w apps/web

      - name: Run DB migrations
        run: npm run migrate -w apps/api
        env:
          DATABASE_URL: postgresql://plated:plated@localhost:5432/plated_test

      - name: Run API tests
        run: npm run test -w apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://plated:plated@localhost:5432/plated_test

      - name: Build web (smoke check)
        run: npm run build -w apps/web
        env:
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder
          VITE_FIREBASE_PROJECT_ID: placeholder
