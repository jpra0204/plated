name: Deploy

on:
  push:
    branches: [main]

# GitHub secrets required in repo Settings → Secrets and variables → Actions:
#   GCP_PROJECT_ID   — GCP project ID (e.g. plated-dev-9e04c)
#   GCP_SA_KEY       — JSON key for a service account with these roles:
#                        Cloud Run Admin
#                        Artifact Registry Writer
#                        Service Account User
#   GCP_REGION       — Cloud Run / Artifact Registry region (e.g. northamerica-northeast1)
#
# Cloud Run service account (default Compute SA) also needs:
#   Secret Manager Secret Accessor — so Cloud Run can read the runtime secrets
#   Cloud SQL Client              — so Cloud Run can open the Cloud SQL socket
# Grant both with:
#   PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
#   SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
#   gcloud projects add-iam-policy-binding $PROJECT_ID --member="serviceAccount:$SA" --role="roles/secretmanager.secretAccessor"
#   gcloud projects add-iam-policy-binding $PROJECT_ID --member="serviceAccount:$SA" --role="roles/cloudsql.client"
#
# Note: --execution-environment=gen2 is required below — gen1's Cloud SQL Unix
# socket mounting is unreliable and produces ENOENT errors connecting to
# /cloudsql/<connection-name>/.s.PGSQL.5432 even with --set-cloudsql-instances
# correctly configured. This bit us once already — don't remove this flag.
#
# Frontend is hosted on Vercel (auto-deploys from main).
# Set VITE_API_URL in your Vercel project env vars to the Cloud Run API URL.

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE_API: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/plated/api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '574.0.0'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build & push API image ─────────────────────────────────────────────

      - name: Build API image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.IMAGE_API }}:${{ github.sha }} \
            -t ${{ env.IMAGE_API }}:latest \
            .

      - name: Push API image
        run: |
          docker push ${{ env.IMAGE_API }}:${{ github.sha }}
          docker push ${{ env.IMAGE_API }}:latest

      # ── Deploy API to Cloud Run ────────────────────────────────────────────

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy plated-api \
            --image="${{ env.IMAGE_API }}:${{ github.sha }}" \
            --region="${{ env.GCP_REGION }}" \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --port=3001 \
            --add-volume=name=cloudsql,type=cloud-sql,instances="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:plated-db" \
            --add-volume-mount=volume=cloudsql,mount-path=/cloudsql \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest" \
            --set-env-vars="NODE_ENV=production" \
            --quiet

      - name: Print API URL
        run: |
          echo "API URL: $(gcloud run services describe plated-api \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')"